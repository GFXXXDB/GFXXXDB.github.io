<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flll Portfolio | Level Artist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <nav class="nav">
        <div class="logo">Flll Portfolio</div>

        <div class="nav-links">
            <a href="#works">作品</a>
            <a href="#about">关于我</a>
            <a href="#contact">联系</a>
            <button type="button" id="editBtn" class="edit-btn">编辑</button>
        </div>
    </nav>

    <div class="hero-content">
        <p class="eyebrow">LEVEL ARTIST / ENVIRONMENT ARTIST</p>
        <h1>游戏关卡美术作品集</h1>
        <p class="hero-desc">专注游戏场景搭建、关卡氛围、灯光表现与环境叙事。</p>
    </div>
</header>

<main>
    <section id="works" class="section works-section">
        <div class="section-title">
            <p>FEATURED WORKS</p>
            <h2>精选作品</h2>
        </div>

        <div id="content" class="works-list"></div>

        <div id="editorPanel" class="editor-panel hidden">
            <button type="button" id="addWorkBtn">+ 添加作品</button>
            <button type="button" id="exitEditBtn">退出编辑</button>
            <button type="button" id="logoutBtn">退出登录</button>
            <button type="button" id="resetBtn" class="danger">重置云端内容</button>
        </div>
    </section>

    <section id="about" class="section about-section">
        <div class="about-card">
            <p>ABOUT ME</p>
            <h2>关于我</h2>
            <span>
                我是一名游戏关卡美术，关注场景空间、环境叙事、灯光氛围和玩家视觉体验。
                这里可以补充你的项目经历、使用软件、擅长方向和联系方式。
            </span>
        </div>
    </section>

    <section id="contact" class="section contact-section">
        <p>CONTACT</p>
        <h2>联系我</h2>
        <span>邮箱 / ArtStation / Bilibili / GitHub 等联系方式可以放在这里。</span>
    </section>
</main>

<footer>
    © 2026 Flll Portfolio
</footer>

<div id="loginModal" class="login-modal hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
